cucumber.publish.quiet=true
cucumber.execution.dry-run=false
# Prevent Cucumber from auto-discovering features during normal test runs.
# TCK features are only executed via OpenCypherTCKRunner suite class.
cucumber.junit-platform.discovery.as-root-engine=false

# Parallel test execution: classes run concurrently, methods within a class run sequentially
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.config.dynamic.factor=1.0
