## @param replicaCount Number of replicas. Values > 1 enable Raft HA automatically.
replicaCount: 1

## @section arcadedb
arcadedb:
  ## @param arcadedb.databaseDirectory Database storage directory inside the container
  databaseDirectory: "/home/arcadedb/databases"
  ## @param arcadedb.defaultDatabases Databases to create at startup. Empty = none.
  ## Example: "Universe[admin:password]"
  defaultDatabases: ""
  ## @param arcadedb.extraCommands Extra JVM -D arguments appended to the startup command
  extraCommands:
    - -Darcadedb.server.mode=production
  ## @param arcadedb.extraEnvironment Additional environment variables for the container
  extraEnvironment: []

  ## @section arcadedb.credentials
  credentials:
    rootPassword:
      ## If secret.name is null a random 32-char secret named 'arcadedb-credentials-secret' is
      ## auto-generated. NOTE: helm template (e.g. ArgoCD) regenerates the secret each render.
      ## For GitOps workflows supply your own secret and set name + key.
      secret:
        ## @param arcadedb.credentials.rootPassword.secret.name Existing secret name (null = auto-generate)
        name: null
        ## @param arcadedb.credentials.rootPassword.secret.key Key inside the existing secret
        key: null

  ## @section arcadedb.plugins
  ## Uncomment and configure to enable wire-protocol plugins.
  plugins: {}
    # gremlin:
    #   enabled: true
    #   port: 8182
    # postgres:
    #   enabled: true
    #   port: 5432
    # mongo:
    #   enabled: false
    #   port: 27017
    # redis:
    #   enabled: false
    #   port: 6379
    # prometheus:
    #   enabled: false
    ## Custom plugin example:
    # myPlugin:
    #   enabled: true
    #   port: 1234
    #   class: com.example.MyPlugin

## @section image
image:
  ## @param image.registry Container registry
  registry: arcadedata
  ## @param image.repository Image repository
  repository: arcadedb
  ## @param image.pullPolicy Image pull policy
  pullPolicy: IfNotPresent
  ## @param image.tag Image tag. Defaults to chart appVersion.
  tag: ""

## @param imagePullSecrets Secrets for pulling from private registries
imagePullSecrets: []
## @param nameOverride Override chart name
nameOverride: ""
## @param fullnameOverride Override fully-qualified app name
fullnameOverride: ""

## @section serviceAccount
serviceAccount:
  ## @param serviceAccount.create Create a ServiceAccount
  create: true
  ## @param serviceAccount.automount Mount the ServiceAccount token into pods.
  ## ArcadeDB does not call the Kubernetes API - keep false.
  automount: false
  ## @param serviceAccount.annotations Annotations for the ServiceAccount
  annotations: {}
  ## @param serviceAccount.name ServiceAccount name. Auto-generated when empty.
  name: ""

## @param podAnnotations Annotations added to every pod
podAnnotations: {}
## @param podLabels Labels added to every pod
podLabels: {}

## @param podSecurityContext Pod-level security context.
## UID/GID 1000 matches the 'arcadedb' user created in the Docker image.
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

## @param securityContext Container-level security context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

## @section service
service:
  ## @section service.http
  http:
    ## @param service.http.type Service type. Use LoadBalancer or configure ingress for external access.
    type: ClusterIP
    ## @param service.http.port HTTP / Studio port
    port: 2480
  ## @section service.rpc
  rpc:
    ## @param service.rpc.port Raft gRPC port (new ha-raft subsystem). Was 2424 in old binary-protocol HA.
    port: 2434

## @section ingress
ingress:
  ## @param ingress.enabled Enable Ingress
  enabled: false
  ## @param ingress.className IngressClass name
  className: ""
  ## @param ingress.annotations Ingress annotations
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  ## @section ingress.hosts
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  ## @param ingress.tls TLS configuration
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

## @param resources Resource requests and limits.
## Commented out by default for dev/Minikube compatibility.
## Tune and uncomment for production.
resources: {}
# resources:
#   requests:
#     cpu: 500m
#     memory: 2Gi    # matches -Xms2G set by ARCADEDB_OPTS_MEMORY in the Docker image
#   limits:
#     memory: 4Gi    # no CPU limit - avoids throttling JVM GC pauses

## @section livenessProbe
livenessProbe:
  httpGet:
    path: /api/v1/ready
    port: http

## @section readinessProbe
readinessProbe:
  httpGet:
    path: /api/v1/ready
    port: http

## @section autoscaling
autoscaling:
  ## @param autoscaling.enabled Enable HorizontalPodAutoscaler.
  ## When enabled, the HA server list is pre-sized to maxReplicas so KubernetesAutoJoin
  ## can add pods dynamically. minReplicas must satisfy Raft quorum: >= floor(maxReplicas/2)+1.
  enabled: false
  ## @param autoscaling.minReplicas Minimum replicas. Must satisfy Raft quorum when HA is active.
  minReplicas: 1
  ## @param autoscaling.maxReplicas Maximum replicas
  maxReplicas: 5
  ## @param autoscaling.targetCPUUtilizationPercentage Target CPU utilization
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

## @section persistence
persistence:
  ## @param persistence.enabled Persist the database directory with a PVC.
  ## Set to false only for ephemeral/dev deployments - all data is lost on pod restart.
  enabled: true
  ## @param persistence.size PVC size
  size: 8Gi
  ## @param persistence.accessMode PVC access mode
  accessMode: ReadWriteOnce
  ## @param persistence.storageClass StorageClass name. Empty = cluster default.
  storageClass: ""

## @param volumes Additional pod volumes
volumes: []
# - name: arcadedb-config
#   configMap:
#     name: my-arcadedb-config

## @param volumeMounts Additional container volume mounts
volumeMounts: []
# - name: arcadedb-config
#   mountPath: /home/arcadedb/config
#   readOnly: true

## @param volumeClaimTemplates Extra StatefulSet volumeClaimTemplates (for config, replication, backups, log).
## The database-data PVC is controlled by persistence.enabled above.
volumeClaimTemplates: []
# - metadata:
#     name: arcadedb-config
#   spec:
#     accessModes:
#       - ReadWriteOnce
#     resources:
#       requests:
#         storage: 1Gi

## @param nodeSelector Node selector
nodeSelector: {}

## @param tolerations Tolerations
tolerations: []

## @section affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - arcadedb
          topologyKey: kubernetes.io/hostname

## @param extraManifests Arbitrary extra Kubernetes manifests to include
extraManifests: {}

## @section networkPolicy
networkPolicy:
  ## @param networkPolicy.enabled Create NetworkPolicy resources.
  ## When enabled: HTTP (2480) is open to all cluster pods; Raft gRPC (2434) is restricted
  ## to ArcadeDB pods only. Recommended for production multi-tenant clusters.
  enabled: false
