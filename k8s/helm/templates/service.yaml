apiVersion: v1
kind: Service
metadata:
  name: {{ include "arcadedb.fullname" . }}-http
  labels:
    {{- include "arcadedb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.http.type }}
  ports:
    - port: {{ .Values.service.http.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "arcadedb.selectorLabels" . | nindent 4 }}

---

{{/*
Headless service for StatefulSet pod DNS discovery.
publishNotReadyAddresses: true ensures DNS entries exist during bootstrap
before readiness probes pass - required to avoid HA bootstrap deadlock.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "arcadedb.fullname" . }}
  labels:
    {{- include "arcadedb.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: {{ .Values.service.http.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.rpc.port }}
      targetPort: rpc
      protocol: TCP
      name: rpc
    {{- include "arcadedb.plugin.service" . | nindent 4 }}
  selector:
    {{- include "arcadedb.selectorLabels" . | nindent 4 }}
