{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "arcadedb.fullname" . }}-http
  labels:
    {{- include "arcadedb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "arcadedb.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: {{ .Values.service.http.port }}
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "arcadedb.fullname" . }}-raft
  labels:
    {{- include "arcadedb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "arcadedb.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "arcadedb.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.service.rpc.port }}
          protocol: TCP
{{- end }}
