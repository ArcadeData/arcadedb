apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "arcadedb.fullname" . }}
  labels:
    {{- include "arcadedb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "arcadedb.fullname" . }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "arcadedb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "arcadedb.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "arcadedb.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.http.port }}
              protocol: TCP
            - name: rpc
              containerPort: {{ .Values.service.rpc.port }}
              protocol: TCP
          command:
            - bin/server.sh
            - -Darcadedb.dumpConfigAtStartup=true
            - -Darcadedb.server.name=$(HOSTNAME)
            - -Darcadedb.server.rootPassword=$(rootPassword)
            - -Darcadedb.server.databaseDirectory={{ .Values.arcadedb.databaseDirectory }}
            - -Darcadedb.server.defaultDatabases={{ .Values.arcadedb.defaultDatabases }}
            {{- if or (gt (int .Values.replicaCount) 1) .Values.autoscaling.enabled }}
            - -Darcadedb.ha.enabled=true
            - -Darcadedb.ha.k8s=true
            - -Darcadedb.ha.k8sSuffix={{ include "arcadedb.k8sSuffix" . }}
            - -Darcadedb.ha.serverList={{ include "arcadedb.nodenames" . }}
            - -Darcadedb.ha.raftPort={{ .Values.service.rpc.port }}
            {{- end }}
            {{- with .Values.arcadedb.extraCommands }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- include "arcadedb.plugin.parameters" . | nindent 12 }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: arcadedb-data
              mountPath: {{ .Values.arcadedb.databaseDirectory }}
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: rootPassword
              {{- if .Values.arcadedb.credentials.rootPassword.secret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.arcadedb.credentials.rootPassword.secret.name }}
                  key: {{ .Values.arcadedb.credentials.rootPassword.secret.key }}
                  optional: false
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: arcadedb-credentials-secret
                  key: rootPassword
              {{- end }}
            {{- with .Values.arcadedb.extraEnvironment }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    {{- if .Values.persistence.enabled }}
    - metadata:
        name: arcadedb-data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
    {{- end }}
    {{- with .Values.volumeClaimTemplates }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
