{{- if .Values.autoscaling.enabled }}
{{- if or (gt (int .Values.replicaCount) 1) .Values.autoscaling.enabled }}
{{- $maxReplicas := int .Values.autoscaling.maxReplicas }}
{{- $minReplicas := int .Values.autoscaling.minReplicas }}
{{- $quorum := add (div $maxReplicas 2) 1 }}
{{- if lt $minReplicas (int $quorum) }}
{{- fail (printf "autoscaling.minReplicas (%d) must be >= floor(maxReplicas/2)+1 (%d) to maintain Raft quorum with maxReplicas=%d. Increase minReplicas or decrease maxReplicas." $minReplicas (int $quorum) $maxReplicas) }}
{{- end }}
{{- end }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "arcadedb.fullname" . }}
  labels:
    {{- include "arcadedb.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "arcadedb.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
