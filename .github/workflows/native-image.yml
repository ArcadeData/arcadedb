name: Native Image

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os_name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.required == false }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (Intel) has been fully retired by GitHub since this plan was drafted - it is no
        # longer a valid hosted-runner label (see actions/runner-images#13518 and the current
        # README at https://github.com/actions/runner-images, checked 2026-07-18). macos-15-intel is
        # the closest still-GA x64 macOS replacement, but it is a "Larger Runners" label: it only
        # schedules if this org/repo has that (paid) entitlement enabled. macos-14 (arm64) is also
        # mid-deprecation as of this date (actions/runner-images#13518), so macos/arm64 uses macos-15
        # instead to avoid shipping a new workflow pinned to an image already on its way out.
        include:
          - { runner: ubuntu-latest,    os_name: linux,   arch: amd64, required: true,  static: true  }
          - { runner: ubuntu-24.04-arm, os_name: linux,   arch: arm64, required: true,  static: true  }
          - { runner: macos-15,         os_name: macos,   arch: arm64, required: false, static: false }
          - { runner: macos-15-intel,   os_name: macos,   arch: amd64, required: false, static: false }
          - { runner: windows-latest,   os_name: windows, arch: amd64, required: false, static: false }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up GraalVM (Community, JDK 25)
        uses: graalvm/setup-graalvm@0def53c0fd8534bc13416c9469f5be45265824fd # v1.6.1
        with:
          java-version: "25"
          distribution: "graalvm-community"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"

      - name: Cache local Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-${{ matrix.arch }}-native-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-native-maven-

      # The two required Linux jobs build fully static (--static --libc=musl, native/pom.xml's
      # native-static profile) executables. That needs more than the compiler:
      #  1. musl-tools + musl-dev (apt) - musl-dev is what actually matters here: on Ubuntu it
      #     installs the arch-prefixed compiler wrapper native-image's musl toolchain probe looks
      #     for (x86_64-linux-musl-gcc / aarch64-linux-musl-gcc - see oracle/graal#7103), plus musl's
      #     own static libc.a/headers under /usr/{include,lib}/<triplet>-linux-musl/ (verified against
      #     Ubuntu 24.04 "noble" package file lists for both amd64 and arm64: the layout and binary
      #     name are identical modulo the `x86_64`/`aarch64` triplet, so `uname -m` genericizes this
      #     across the matrix without an arch if/else). musl-tools additionally provides the
      #     unprefixed `musl-gcc`/`musl-ldd` convenience wrapper.
      #  2. A musl-linked static zlib (native-image links libz for the JDK's zip/net code under
      #     --libc=musl), per GraalVM's "Static and Mostly-Static Images" guide
      #     (https://www.graalvm.org/latest/reference-manual/native-image/guides/build-static-executables/).
      #     musl-gcc's generated specs file (/usr/lib/<triplet>-linux-musl/musl-gcc.specs) passes
      #     -nostdinc/-nostdlib and restricts header/library search to that same <triplet>-linux-musl
      #     directory - it does NOT fall back to the generic /usr/include or /usr/lib search path.
      #     zlib must therefore be installed with --includedir/--libdir pointed AT that directory
      #     (confirmed via musl's own tools/musl-gcc.specs.sh: "-nostdinc -isystem $incdir" /
      #     "-nostdlib" + "-L$libdir"), not a plain --prefix=/usr, or native-image's `-lz` link step
      #     will not find it without extra -H:CLibraryPath/-H:CIncludePath buildArgs (native/pom.xml
      #     intentionally adds only --static --libc=musl, nothing path-related).
      #
      # postgresql-client closes the local no-psql gap so exercise.sh's Postgres-wire check actually
      # runs instead of WARN-skipping (see native/src/test/scripts/exercise.sh).
      #
      # KNOWN GAP - confirmed 2026-07-18 against the graalvm-community-jdk-25.0.2 release tarballs
      # this workflow's setup-graalvm step installs: the linux-aarch64 distribution ships
      # lib/static/linux-aarch64/glibc but NOT lib/static/linux-aarch64/musl (linux-amd64 ships
      # both). --static --libc=musl will fail at the native-image link stage on the arm64 job
      # ("Missing libraries: java, nio, net, zip") regardless of the toolchain setup below, until
      # Oracle ships musl static JDK libs for aarch64 (see oracle/graal#4645, closed not-planned) or
      # ArcadeDB builds/vendors its own. The toolchain/zlib setup below is still correct and
      # forward-compatible for when that gap closes; until then, expect the arm64 static leg of this
      # workflow to fail here even though the steps themselves are right. See docs/native-image.md.
      - name: Set up musl toolchain (static Linux builds)
        if: ${{ matrix.os_name == 'linux' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev postgresql-client

          TRIPLET="$(uname -m)-linux-musl"
          MUSL_GCC="${TRIPLET}-gcc"
          MUSL_INCDIR="/usr/include/${TRIPLET}"
          MUSL_LIBDIR="/usr/lib/${TRIPLET}"
          command -v "$MUSL_GCC" >/dev/null || { echo "::error::$MUSL_GCC not found after installing musl-dev"; exit 1; }

          ZLIB_VERSION="1.3.2"
          curl -fsSL "https://github.com/madler/zlib/releases/download/v${ZLIB_VERSION}/zlib-${ZLIB_VERSION}.tar.gz" -o /tmp/zlib.tar.gz
          tar xzf /tmp/zlib.tar.gz -C /tmp
          (
            cd "/tmp/zlib-${ZLIB_VERSION}"
            CC="$MUSL_GCC" ./configure --static --prefix=/usr --includedir="$MUSL_INCDIR" --libdir="$MUSL_LIBDIR"
            make -j"$(nproc)"
            sudo make install
          )

          echo "CC=$MUSL_GCC" >> "$GITHUB_ENV"
          "$MUSL_GCC" --version
          "$MUSL_GCC" -print-file-name=libz.a

      - name: Build native image
        shell: bash
        run: |
          ARGS=""
          if [ "${{ matrix.static }}" = "true" ]; then
            ARGS="-Dnative.static=true"
          fi
          mvn -B -ntp -Pnative -pl native -am -DskipTests $ARGS package

      # native-maven-plugin names the executable via os-maven-plugin's os.detected.name/arch
      # (e.g. osx-aarch_64, linux-x86_64, windows-x86_64), which does NOT match this matrix's
      # os_name/arch labels (macos/arm64, linux/amd64, ...). Glob for the one file under
      # native/target/ that isn't a Maven jar/sources-jar/build-report artifact instead of
      # constructing the name from matrix fields.
      - name: Locate native binary
        id: locate
        shell: bash
        run: |
          cd native/target
          mapfile -t CANDIDATES < <(find . -maxdepth 1 -type f -name 'arcadedb-*' \
            ! -name '*.jar' ! -name '*.txt' ! -name '*.o' -print | sed 's|^\./||')
          if [ "${#CANDIDATES[@]}" -ne 1 ]; then
            echo "::error::expected exactly one native binary in native/target, found ${#CANDIDATES[@]}"
            ls -la .
            exit 1
          fi
          echo "bin_name=${CANDIDATES[0]}" >> "$GITHUB_OUTPUT"
          echo "[locate] native binary: ${CANDIDATES[0]}"

      # Windows smoke is best-effort (job-level continue-on-error already covers it); Git Bash on
      # the windows-latest runner can execute smoke.sh directly. Only the two Linux jobs pass the
      # full wire-protocol plugin list, matching trace.sh, so Postgres/Redis/Mongo/Bolt/gRPC are
      # actually reachable for exercise.sh's checks.
      - name: Smoke test
        shell: bash
        run: |
          BIN="native/target/${{ steps.locate.outputs.bin_name }}"
          chmod +x "$BIN" || true
          if [ "${{ matrix.os_name }}" = "linux" ]; then
            PLUGINS="Postgres:com.arcadedb.postgres.PostgresProtocolPlugin"
            PLUGINS="$PLUGINS,Redis:com.arcadedb.redis.RedisProtocolPlugin"
            PLUGINS="$PLUGINS,MongoDB:com.arcadedb.mongo.MongoDBProtocolPlugin"
            PLUGINS="$PLUGINS,Bolt:com.arcadedb.bolt.BoltProtocolPlugin"
            PLUGINS="$PLUGINS,Grpc:com.arcadedb.server.grpc.GrpcServerPlugin"
            native/src/test/scripts/smoke.sh "$BIN" -Dorg.jline.terminal.dumb=true "-Darcadedb.server.plugins=$PLUGINS"
          else
            native/src/test/scripts/smoke.sh "$BIN" -Dorg.jline.terminal.dumb=true
          fi

      - name: Package artifact
        shell: bash
        run: |
          cd native/target
          BIN="${{ steps.locate.outputs.bin_name }}"
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            ARCHIVE="${BIN%.exe}.zip"
            7z a "$ARCHIVE" "$BIN"
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256" || shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            ARCHIVE="$BIN.tar.gz"
            tar czf "$ARCHIVE" "$BIN"
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256" || sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arcadedb-native-${{ matrix.os_name }}-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            native/target/arcadedb-*.tar.gz
            native/target/arcadedb-*.zip
            native/target/*.sha256

      - name: Attach to release
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            native/target/arcadedb-*.tar.gz native/target/arcadedb-*.zip native/target/*.sha256 \
            --clobber
