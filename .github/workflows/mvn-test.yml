name: Java CI - test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    # Skip if only Python bindings change
    paths-ignore:
      - 'bindings/python/**'
  push:
    branches:
      - main
    # Skip if only Python bindings change
    paths-ignore:
      - 'bindings/python/**'

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Ensure SHA pinned actions
        uses: zgosalvez/github-actions-ensure-sha-pinned-actions@3db98c0363e2fa5df3e1c4c471777a7c10b24cc9 # v5.0.5
      - name: Check test database paths
        run: ./.github/scripts/check-test-database-paths.sh
      - name: Run pre-commit
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.0"
          cache: "pip"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  build-and-package:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: 21

      - name: Cache local Maven repository
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Get project version
        id: get-version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Build and package with Maven Docker profile
        run: ./mvnw clean install -Pdocker -DskipTests --batch-mode --errors  --show-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save docker image
        run: docker save arcadedata/arcadedb:latest > /tmp/arcadedb-image.tar

      - name: Cache Docker image
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/arcadedb-image.tar
          key: docker-image-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Cache Maven artifacts
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-repo-${{ github.run_id }}-${{ github.run_attempt }}

  unit-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: 21
          cache: "maven"

      - name: Restore Maven artifacts
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-repo-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Run Unit Tests with Coverage
        # package phase runs surefire (test) and JaCoCo report (prepare-package) without reaching integration-test phase
        run: ./mvnw verify -Pcoverage --batch-mode --errors --fail-never --show-version -pl !e2e,!load-tests -DexcludedGroups=slow,benchmark -Dsurefire.includes=**/*Test.java,**/*Suite.java
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # A test that derives its path from SERVER_ROOT_PATH cannot be caught by the static grep in
      # the setup job - only the directory it leaves behind proves it wrote outside target/.
      - name: Check no test leaked a databases/ directory
        run: ./.github/scripts/check-test-database-paths.sh --runtime

      - name: Unit Tests Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: Unit Tests Report
          path: "**/surefire-reports/TEST*.xml"
          only-summary: 'true'
          list-tests: 'failed'
          list-suites: 'failed'
          reporter: java-junit

      - name: Upload unit test coverage reports
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-coverage-reports
          path: |
            **/jacoco*.xml
          retention-days: 1

  slow-unit-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: 21
          cache: "maven"

      - name: Restore Maven artifacts
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-repo-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Run Slow Unit Tests with Coverage
        run: ./mvnw package -Pcoverage --batch-mode --errors --fail-never --show-version -pl engine  -Dgroups=slow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Unit Tests Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: Unit Tests Report
          path: "**/surefire-reports/TEST*.xml"
          list-tests: "failed"
          list-suites: "failed"
          reporter: java-junit

      - name: Upload unit test coverage reports
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: slow-unit-coverage-reports
          path: |
            **/jacoco*.xml
          retention-days: 1

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: 21
          cache: "maven"

      - name: Restore Maven artifacts
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-repo-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Run Integration Tests with Coverage
        run: ./mvnw verify -DskipTests -Pintegration -Pcoverage  --batch-mode --errors --fail-never --show-version -pl !e2e,!load-tests,!e2e-ha,!ha-raft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: IT Tests Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: IT Tests Report
          path: "**/failsafe-reports/TEST*.xml"
          list-tests: "failed"
          list-suites: "failed"
          reporter: java-junit

      - name: Upload integration test coverage reports
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-coverage-reports
          path: |
            **/jacoco*.xml
          retention-days: 1

  ha-integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: 21
          cache: "maven"

      - name: Restore Maven artifacts
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-repo-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Run HA Integration Tests with Coverage
        run: ./mvnw verify -DskipTests -Pintegration -Pcoverage  --batch-mode --errors --fail-never --show-version -pl ha-raft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: HA IT Tests Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: HA IT Tests Report
          path: "**/failsafe-reports/TEST*.xml"
          list-tests: "failed"
          list-suites: "failed"
          reporter: java-junit

      - name: Upload HA integration test coverage reports
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ha-integration-coverage-reports
          path: |
            **/jacoco*.xml
          retention-days: 1

  builder-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: 21
          cache: "maven"

      - name: Restore Maven artifacts
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-repo-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build packages for Builder Tests
        run: ./mvnw clean package -DskipTests --batch-mode --errors  --show-version

      - name: Run Builder Tests
        working-directory: package
        run: ./test-builder-local.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  java-e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: 21
          cache: "maven"

      - name: Restore Maven artifacts
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-repo-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Restore Docker image
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/arcadedb-image.tar
          key: docker-image-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Load Docker image
        run: docker load < /tmp/arcadedb-image.tar

      - name: E2E Tests
        run: ./mvnw verify -Pintegration -pl e2e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCADEDB_DOCKER_IMAGE: ${{ needs.build-and-package.outputs.image-tag }}

      - name: E2E Tests Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: Java E2E Tests Report
          path: "e2e/target/failsafe-reports/TEST*.xml"
          list-suites: "failed"
          list-tests: "failed"
          reporter: java-junit

  js-e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Node 24.9+ required: testcontainers@12 pulls archiver@8 (pure ESM), and
          # Jest's require(ESM) bridge only works on Node 24.9+ (synchronous vm module APIs).
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "e2e-js/package-lock.json"

      - name: Restore Docker image
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/arcadedb-image.tar
          key: docker-image-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Load Docker image
        run: docker load < /tmp/arcadedb-image.tar

      - name: E2E Node.js Tests
        working-directory: e2e-js
        run: |
          npm install
          npm test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCADEDB_DOCKER_IMAGE: ${{ needs.build-and-package.outputs.image-tag }}

      - name: JS E2E Tests Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: JS E2E Tests Report
          path: "e2e-js/reports/jest-junit.xml"
          list-suites: "failed"
          list-tests: "failed"
          reporter: java-junit

      - name: Upload JS E2E JUnit report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: js-e2e-junit
          path: e2e-js/reports/jest-junit.xml
          retention-days: 7

  studio-e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "e2e-studio/package-lock.json"

      - name: Restore Docker image
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/arcadedb-image.tar
          key: docker-image-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Load Docker image
        run: docker load < /tmp/arcadedb-image.tar

      - name: Install Playwright Browsers
        working-directory: e2e-studio
        run: |
          npm install
          npm run install-browsers

      - name: E2E Studio Tests
        working-directory: e2e-studio
        run: |
          npm run test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCADEDB_DOCKER_IMAGE: ${{ needs.build-and-package.outputs.image-tag }}

      - name: Studio E2E Tests Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: Studio E2E Tests Report
          path: "e2e-studio/reports/playwright-junit.xml"
          list-suites: "failed"
          list-tests: "failed"
          reporter: java-junit

      - name: Upload Studio E2E test artifacts
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-e2e-artifacts
          path: |
            e2e-studio/test-results/
            e2e-studio/playwright-report/
          retention-days: 7

  python-e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.0"
          cache: "pip"
          cache-dependency-path: "e2e-python/requirements*.txt"

      - name: Setup UV package manager
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv --version

      - name: Restore Docker image
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/arcadedb-image.tar
          key: docker-image-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Load Docker image
        run: docker load < /tmp/arcadedb-image.tar

      - name: E2E Python Tests
        working-directory: e2e-python
        run: |
          uv pip install --system -e .
          uv pip install --system pytest
          mkdir -p reports
          pytest tests/ --junitxml=reports/python-junit.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCADEDB_DOCKER_IMAGE: ${{ needs.build-and-package.outputs.image-tag }}

      - name: Python E2E Tests Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: Python E2E Tests Report
          path: "e2e-python/reports/python-junit.xml"
          list-suites: "failed"
          list-tests: "failed"
          reporter: java-junit

      - name: Upload Python E2E JUnit report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-e2e-junit
          path: e2e-python/reports/python-junit.xml
          retention-days: 7

  csharp-e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0"
          cache: true
          cache-dependency-path: "e2e-csharp/ArcadeDB.E2ETests/ArcadeDB.E2ETests.csproj"

      - name: Restore Docker image
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/arcadedb-image.tar
          key: docker-image-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Load Docker image
        run: docker load < /tmp/arcadedb-image.tar

      - name: E2E C# Tests
        working-directory: e2e-csharp/ArcadeDB.E2ETests
        # Absolute LogFilePath: JunitXml.TestLogger resolves a relative path
        # against the results directory in some versions, which would land the
        # file where the reporter/convert step does not look.
        run: |
          mkdir -p reports
          dotnet test --logger "trx;LogFileName=test-results.trx" --logger "junit;LogFilePath=${{ github.workspace }}/e2e-csharp/ArcadeDB.E2ETests/reports/csharp-junit.xml"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCADEDB_DOCKER_IMAGE: ${{ needs.build-and-package.outputs.image-tag }}

      - name: C# E2E Tests Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: C# E2E Tests Report
          path: "e2e-csharp/ArcadeDB.E2ETests/reports/csharp-junit.xml"
          list-suites: "failed"
          list-tests: "failed"
          reporter: java-junit

      - name: Upload C# E2E JUnit report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: csharp-e2e-junit
          path: e2e-csharp/ArcadeDB.E2ETests/reports/csharp-junit.xml
          retention-days: 7

  go-e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-package
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Track the module's go directive so the toolchain always matches
          # go.mod instead of a hardcoded version that can drift after dep bumps.
          go-version-file: "e2e-go/go.mod"
          cache-dependency-path: "e2e-go/go.sum"

      - name: Restore Docker image
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/arcadedb-image.tar
          key: docker-image-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Load Docker image
        run: docker load < /tmp/arcadedb-image.tar

      # The TLS scenarios (CONN-002/005) generate a keystore with keytool. It
      # ships with the JDK preinstalled on ubuntu-latest; fail loudly here if it
      # ever leaves the PATH, so those scenarios can't silently skip in CI.
      - name: Verify keytool is available (required by TLS scenarios)
        run: command -v keytool

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: E2E Go Tests
        working-directory: e2e-go
        # 20m timeout: the plain container plus a derived-image build and two
        # TLS containers (150s startup each) run sequentially and can approach
        # the default 10m per-package deadline on a shared runner.
        run: |
          mkdir -p reports
          gotestsum --junitfile reports/go-junit.xml --format standard-verbose -- -timeout 20m ./...
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCADEDB_DOCKER_IMAGE: ${{ needs.build-and-package.outputs.image-tag }}

      - name: Go E2E Tests Reporter
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: success() || failure()
        with:
          name: Go E2E Tests Report
          path: "e2e-go/reports/go-junit.xml"
          list-suites: "failed"
          list-tests: "failed"
          reporter: java-junit

      - name: Upload Go E2E JUnit report
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-e2e-junit
          path: e2e-go/reports/go-junit.xml
          retention-days: 7

  coverage-report:
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests, slow-unit-tests ]
    if: success() || failure()
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download unit test coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: unit-coverage-reports
          path: unit-coverage

      - name: Download slow unit test coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: slow-unit-coverage-reports
          path: slow-unit-coverage


      - name: Download integration test coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: integration-coverage-reports
          path: integration-coverage


      - name: Download HA integration test coverage reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: ha-integration-coverage-reports
          path: ha-integration-coverage

      - name: Get coverage files
        id: coverage-files-generator
        if: success() || failure()
        run: echo "COVERAGE_FILES=$(find . -path **/jacoco*.xml -printf '%p,')" >> "$GITHUB_OUTPUT"

      - name: Codacy coverage reporter
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        if: success() || failure()
        with:
          language: java
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: ${{ steps.coverage-files-generator.outputs.COVERAGE_FILES }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: success() || failure()
        with:
          fail_ci_if_error: false
          disable_search: true
          files: ${{ steps.coverage-files-generator.outputs.COVERAGE_FILES }}
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ArcadeData/arcadedb
          verbose: true
