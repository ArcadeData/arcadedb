name: CI debug - failing tests only

# Temporary workflow for the run-29655421987 triage branch. Runs only the failing tests so a
# debug cycle costs minutes instead of a full CI pass. Delete before merging the fix to main.
#
# The targeted job alone is not sufficient: several of these failures reproduce only when the
# whole module runs in one reused fork (the engine and server suites share static state and a
# single JVM). The suite job reproduces that ordering; the targeted job gives the fast signal.

on:
  push:
    branches:
      - "fix/ci-green-29655421987"
  workflow_dispatch:

concurrency:
  group: ci-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: 21
          cache: "maven"

      - name: Build without tests
        run: ./mvnw install -DskipTests --batch-mode --errors --show-version -pl '!e2e,!load-tests'

      - name: Cache Maven artifacts
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-repo-debug-${{ github.run_id }}-${{ github.run_attempt }}

  targeted:
    name: Targeted - only the failing test classes
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: 21
          cache: "maven"

      - name: Restore Maven artifacts
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-repo-debug-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Engine unit test
        run: ./mvnw test -pl engine --batch-mode --errors --show-version -Dtest=Issue4547ReadOnlyRecoveryLockLeakTest -DfailIfNoSpecifiedTests=false

      - name: Server integration tests
        if: success() || failure()
        run: ./mvnw verify -DskipTests -Pintegration -pl server --batch-mode --errors --show-version -Dit.test=BackupHttpErrorHandlingIT,RemoteDatabaseIT,HttpRedMetricsIT,QueryRedMetricsIT -DfailIfNoSpecifiedTests=false

      - name: Console integration tests
        if: success() || failure()
        run: ./mvnw verify -DskipTests -Pintegration -pl console --batch-mode --errors --show-version -Dit.test=RemoteConsoleIT -DfailIfNoSpecifiedTests=false

  suite-order:
    name: Full module suites - reproduces cross-test ordering
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: 21
          cache: "maven"

      - name: Restore Maven artifacts
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2/repository
          key: maven-repo-debug-${{ github.run_id }}-${{ github.run_attempt }}

      # Mirrors the unit-tests job of mvn-test.yml, narrowed to the engine module that owns the
      # order-dependent failure.
      - name: Engine unit suite
        run: ./mvnw verify -pl engine --batch-mode --errors --fail-never --show-version -DexcludedGroups=slow,benchmark -Dsurefire.includes=**/*Test.java,**/*Suite.java

      # Mirrors the integration-tests job of mvn-test.yml for the two modules that fail there.
      - name: Server and console integration suites
        if: success() || failure()
        run: ./mvnw verify -DskipTests -Pintegration -pl server,console --batch-mode --errors --fail-never --show-version

      - name: Report
        if: success() || failure()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Debug suite report
          path: "**/surefire-reports/TEST*.xml,**/failsafe-reports/TEST*.xml"
          list-tests: "failed"
          list-suites: "failed"
          reporter: java-junit
